<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>قراءة — انتروبيا الحنين (كاملة)</title>
<meta name="description" content="اقرأ رواية انتروبيا الحنين كاملة لشذى ياسر الجوبحي مباشرة على المتصفح. 7 فصول + ملاحق وأقباس.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=Noto+Naskh+Arabic:wght@400;500;700&family=Reem+Kufi:wght@400;500;600;700&family=Amiri:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

<style>
:root {
  --bg:        #F4F1EA;
  --bg-soft:   #EFEBE1;
  --ink:       #1B1A17;
  --ink-soft:  #4A463E;
  --ink-mute:  #8A847A;
  --rule:      #D9D3C5;
  --brass:     #8C6B3F;
  --brass-soft:#B89968;
  --brass-glow:#E4C988;
  --card:      #ECE7DB;
  --night:     #0E1116;
  --f-display: 'Reem Kufi', 'IBM Plex Sans Arabic', serif;
  --f-head:    'IBM Plex Sans Arabic', 'Noto Naskh Arabic', sans-serif;
  --f-body:    'Noto Naskh Arabic', 'IBM Plex Sans Arabic', serif;
  --f-quote:   'Amiri', 'Noto Naskh Arabic', serif;
  --reading-size: 19px;
  --reading-lh: 1.95;
  --max-read-width: 720px;
}
html.theme-night {
  --bg:#14161B; --bg-soft:#1A1D23; --ink:#E8E4D8; --ink-soft:#B8B3A6;
  --ink-mute:#7A7568; --rule:#2A2D33; --brass:#B89968; --brass-soft:#8C6B3F;
  --brass-glow:#E4C988; --card:#1F2228; --night:#0E1116;
}
html.theme-sepia {
  --bg:#F0E6D2; --bg-soft:#E8DCC4; --ink:#3D2F1F; --ink-soft:#5A4632;
  --ink-mute:#8B7355; --rule:#C9B896; --brass:#8C5A2B; --brass-soft:#B8845A;
  --brass-glow:#D4A574; --card:#E5D9C0;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--f-body);
  font-size: var(--reading-size);
  line-height: var(--reading-lh);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  transition: background 0.3s ease, color 0.3s ease;
}

/* === TOP BAR === */
.topbar {
  position: sticky; top: 0; z-index: 100;
  background: var(--bg);
  border-bottom: 1px solid var(--rule);
  padding: 12px 24px;
  display: flex; align-items: center; justify-content: space-between; gap: 16px;
  backdrop-filter: blur(10px);
}
.topbar-left { display: flex; align-items: center; gap: 14px; }
.topbar-logo {
  font-family: var(--f-display); font-size: 18px; font-weight: 500;
  color: var(--brass); text-decoration: none; letter-spacing: 0.02em;
}
.topbar-divider { width: 1px; height: 20px; background: var(--rule); }
.topbar-chapter-label {
  font-family: var(--f-head); font-size: 13px; color: var(--ink-soft); font-weight: 500;
}
.topbar-right { display: flex; align-items: center; gap: 8px; }
.icon-btn {
  width: 36px; height: 36px;
  display: inline-flex; align-items: center; justify-content: center;
  border: 1px solid var(--rule); background: var(--bg); color: var(--ink-soft);
  border-radius: 4px; cursor: pointer; transition: all 0.2s ease;
}
.icon-btn:hover { border-color: var(--brass); color: var(--brass); }
.icon-btn svg { width: 18px; height: 18px; }
.icon-btn.active { background: var(--brass); color: var(--bg); border-color: var(--brass); }

.size-control {
  display: inline-flex; align-items: center;
  border: 1px solid var(--rule); border-radius: 4px; overflow: hidden;
}
.size-btn {
  background: var(--bg); border: none; padding: 0 12px; height: 36px;
  cursor: pointer; color: var(--ink-soft); font-family: var(--f-head);
  font-weight: 500; transition: all 0.2s ease;
}
.size-btn:hover { color: var(--brass); }
.size-btn.small { font-size: 12px; }
.size-btn.medium { font-size: 14px; border-inline-start: 1px solid var(--rule); border-inline-end: 1px solid var(--rule); }
.size-btn.large { font-size: 16px; }

/* === PROGRESS BAR === */
.progress-bar {
  position: fixed; top: 60px; inset-inline: 0; height: 2px;
  background: var(--rule); z-index: 99;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--brass), var(--brass-glow));
  width: 0%; transition: width 0.1s ease;
}

/* === READER LAYOUT === */
.reader-shell {
  display: grid;
  grid-template-columns: 280px 1fr;
  min-height: calc(100vh - 60px);
  max-width: 1200px;
  margin: 0 auto;
}

/* === SIDEBAR === */
.sidebar {
  border-inline-end: 1px solid var(--rule);
  padding: 32px 24px;
  position: sticky; top: 62px;
  height: calc(100vh - 62px);
  overflow-y: auto;
  background: var(--bg);
}
.sidebar-title {
  font-family: var(--f-head); font-size: 11px; font-weight: 500;
  letter-spacing: 0.3em; color: var(--ink-mute); text-transform: uppercase;
  margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid var(--rule);
}
.toc-item {
  display: flex; align-items: center; gap: 12px;
  padding: 12px; border-radius: 4px; cursor: pointer;
  transition: all 0.2s ease; margin-bottom: 4px; text-decoration: none;
  color: var(--ink-soft);
}
.toc-item:hover { background: var(--bg-soft); color: var(--ink); }
.toc-item.active { background: var(--card); color: var(--brass); font-weight: 500; }
.toc-num {
  font-family: var(--f-display); font-size: 20px; font-weight: 600;
  color: var(--brass-soft); direction: ltr; width: 32px; text-align: center;
}
.toc-item.active .toc-num { color: var(--brass); }
.toc-text {
  font-family: var(--f-head); font-size: 14px; font-weight: 500; flex: 1;
  line-height: 1.4;
}
.toc-item-meta {
  font-family: var(--f-body); font-size: 11px;
  color: var(--ink-mute); margin-top: 2px;
}
.toc-section-label {
  font-family: var(--f-head); font-size: 11px; font-weight: 600;
  color: var(--ink-mute); letter-spacing: 0.2em; text-transform: uppercase;
  margin: 20px 0 12px; padding-top: 16px; border-top: 1px solid var(--rule);
}

/* === READING AREA === */
.reading-area {
  padding: 60px 64px 120px;
  max-width: var(--max-read-width);
  margin: 0 auto;
  width: 100%;
}

/* Preface view */
.preface-view { text-align: center; }
.preface-epigraph {
  font-family: var(--f-quote); font-style: italic; font-size: 22px;
  line-height: 1.9; color: var(--ink-soft); max-width: 580px;
  margin: 0 auto 48px; padding: 24px 0; position: relative;
}
.preface-epigraph::before, .preface-epigraph::after {
  content: ""; display: block; width: 40px; height: 1px;
  background: var(--brass); margin: 20px auto; opacity: 0.6;
}
.preface-title {
  font-family: var(--f-display); font-size: 36px; font-weight: 500;
  color: var(--ink); letter-spacing: 0.08em; margin-bottom: 48px;
}
.preface-body p {
  text-align: justify; text-indent: 1.5em; margin-bottom: 1em;
}
.preface-body p:first-child { text-indent: 0; }
.preface-sign {
  margin-top: 48px; font-family: var(--f-quote); font-style: italic;
  color: var(--ink-soft);
}
.preface-sign .sig-name {
  display: block; font-family: var(--f-display); font-style: normal;
  font-size: 20px; color: var(--brass); margin-bottom: 4px;
}

/* Chapter opener */
.chapter-opener {
  text-align: center; margin-bottom: 64px; padding-top: 40px; position: relative;
}
.chapter-opener-orbit {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 320px; height: 320px; opacity: 0.18; pointer-events: none;
}
.chapter-opener-num {
  font-family: var(--f-display); font-size: 120px; font-weight: 600;
  color: var(--brass); opacity: 0.2; line-height: 1;
  margin-bottom: 8px; direction: ltr;
}
.chapter-opener-label {
  font-family: var(--f-head); font-size: 12px; font-weight: 500;
  letter-spacing: 0.4em; color: var(--brass); text-transform: uppercase;
  margin-bottom: 16px;
}
.chapter-opener-title {
  font-family: var(--f-display); font-size: 40px; font-weight: 500;
  color: var(--ink); line-height: 1.2; margin: 16px auto 24px;
  max-width: 560px; position: relative; z-index: 1;
}
.chapter-opener-sub {
  display: block; font-family: var(--f-quote); font-style: italic;
  font-size: 22px; color: var(--ink-soft); margin-top: 8px;
}
.chapter-opener-rule {
  width: 60px; height: 1px; background: var(--brass); margin: 0 auto 32px;
}
.chapter-opener-epigraph {
  font-family: var(--f-quote); font-style: italic; font-size: 18px;
  line-height: 1.8; color: var(--ink-soft); max-width: 540px;
  margin: 0 auto; position: relative; z-index: 1;
}

/* Reading content */
.reading-content p {
  font-family: var(--f-body); font-size: var(--reading-size);
  line-height: var(--reading-lh); color: var(--ink);
  text-align: justify; text-justify: inter-word;
  margin: 0 0 1em; text-indent: 1.5em; orphans: 3; widows: 3;
}
.reading-content p.first-para {
  text-indent: 0;
}
.reading-content p.first-para::first-letter {
  font-family: var(--f-display); font-size: 56px; font-weight: 600;
  color: var(--brass); float: right; line-height: 0.9;
  margin: 4px 0 0 8px; padding: 0;
}

.reading-content .voice,
.reading-content .letter,
.reading-content .whisper,
.reading-content .signature {
  font-family: var(--f-quote); font-style: italic;
  text-indent: 0; break-inside: avoid;
}
.reading-content .voice {
  font-size: calc(var(--reading-size) * 0.97); line-height: 1.9;
  color: var(--ink); margin: 0.8em 0;
  padding-inline-start: 1.2em; border-inline-start: 2px solid var(--rule);
}
.reading-content .letter {
  font-size: calc(var(--reading-size) * 0.95); line-height: 1.95;
  color: var(--ink-soft); background: var(--bg-soft);
  border-inline-start: 2px solid var(--brass);
  padding: 1em 1.4em; margin: 1.2em 0;
}
.reading-content .whisper {
  font-size: var(--reading-size); line-height: 1.95;
  color: var(--ink-soft); text-align: center;
  margin: 1.5em auto; max-width: 540px; padding: 0 1em;
}
.reading-content .signature {
  font-size: 14px; color: var(--brass); text-align: center;
  margin: 1em 0 2em; letter-spacing: 0.05em;
}

/* Sub-section title (for appendices) */
.sub-section-title {
  font-family: var(--f-display); font-size: 24px; font-weight: 500;
  color: var(--brass); text-align: center; margin: 48px 0 24px;
  letter-spacing: 0.05em; break-after: avoid;
}
.sub-section-title::before, .sub-section-title::after {
  content: ""; display: inline-block; width: 30px; height: 1px;
  background: var(--brass); vertical-align: middle; margin: 0 12px; opacity: 0.6;
}

/* === NAVIGATION === */
.chapter-nav {
  display: flex; justify-content: space-between; align-items: center;
  margin-top: 80px; padding-top: 32px;
  border-top: 1px solid var(--rule); gap: 16px;
}
.nav-btn {
  display: inline-flex; align-items: center; gap: 10px;
  padding: 12px 24px; background: var(--bg);
  border: 1px solid var(--rule); color: var(--ink-soft);
  font-family: var(--f-head); font-size: 14px; font-weight: 500;
  cursor: pointer; text-decoration: none; border-radius: 4px;
  transition: all 0.2s ease;
}
.nav-btn:hover:not(:disabled) {
  border-color: var(--brass); color: var(--brass); background: var(--bg-soft);
}
.nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.nav-btn-label {
  font-size: 11px; color: var(--ink-mute);
  letter-spacing: 0.2em; text-transform: uppercase;
}
.nav-btn-title { font-size: 14px; color: inherit; margin-top: 2px; }

/* === END-OF-BOOK === */
.end-of-book {
  text-align: center; padding: 80px 0; margin-top: 80px;
  border-top: 1px solid var(--rule);
}
.end-of-book svg { width: 48px; height: 48px; opacity: 0.4; margin-bottom: 24px; }
.end-of-book-text {
  font-family: var(--f-quote); font-style: italic; font-size: 20px;
  color: var(--ink-soft); line-height: 1.8; margin-bottom: 32px;
}
.end-of-book-back {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 12px 28px; background: var(--brass); color: var(--bg);
  text-decoration: none; font-family: var(--f-head); font-size: 14px;
  font-weight: 500; border-radius: 4px; transition: all 0.2s ease;
}
.end-of-book-back:hover { background: var(--brass-glow); }

/* === MOBILE === */
.sidebar-toggle { display: none; }
.sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 90; }
.sidebar-overlay.show { display: block; }

@media (max-width: 960px) {
  .reader-shell { grid-template-columns: 1fr; }
  .sidebar {
    position: fixed; inset-inline-start: 0; top: 60px;
    width: 280px; height: calc(100vh - 60px);
    background: var(--bg); z-index: 95;
    transform: translateX(100%); transition: transform 0.3s ease;
    box-shadow: -4px 0 24px rgba(0,0,0,0.15);
  }
  html[dir="rtl"] .sidebar.open { transform: translateX(0); }
  .sidebar-toggle { display: inline-flex; }
  .reading-area { padding: 32px 24px 80px; }
  .chapter-opener-title { font-size: 30px; }
  .chapter-opener-num { font-size: 80px; }
  .preface-title { font-size: 28px; }
  .topbar-chapter-label { display: none; }
}
@media (max-width: 540px) {
  .reading-area { padding: 24px 18px 80px; }
  .topbar { padding: 10px 14px; }
  .topbar-logo { font-size: 15px; }
  .icon-btn { width: 32px; height: 32px; }
  .icon-btn svg { width: 16px; height: 16px; }
  .chapter-opener-num { font-size: 60px; }
  .chapter-opener-title { font-size: 24px; }
  .preface-title { font-size: 22px; }
  .nav-btn { padding: 10px 16px; }
  .nav-btn-label { display: none; }
  .size-btn { padding: 0 8px; }
}
</style>
</head>
<body class="theme-parchment">

<header class="topbar">
  <div class="topbar-left">
    <button class="icon-btn sidebar-toggle" id="sidebarToggle" aria-label="الفهرس">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="3" y1="6" x2="21" y2="6"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
    <a class="topbar-logo" href="/">انتروبيا الحنين</a>
    <span class="topbar-divider"></span>
    <span class="topbar-chapter-label" id="chapterLabel">المقدمة</span>
  </div>
  <div class="topbar-right">
    <div class="size-control" role="group" aria-label="حجم الخط">
      <button class="size-btn small" data-size="16" aria-label="صغير">أ−</button>
      <button class="size-btn medium active" data-size="19" aria-label="متوسط">أ</button>
      <button class="size-btn large" data-size="22" aria-label="كبير">أ+</button>
    </div>
    <button class="icon-btn theme-btn" data-theme="parchment" aria-label="وضع الورق">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <circle cx="12" cy="12" r="9"/><path d="M12 3a9 9 0 000 18"/>
      </svg>
    </button>
    <button class="icon-btn theme-btn" data-theme="sepia" aria-label="وضع سيبيا">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <circle cx="12" cy="12" r="4"/>
        <path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
      </svg>
    </button>
    <button class="icon-btn theme-btn" data-theme="night" aria-label="الوضع الليلي">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
      </svg>
    </button>
  </div>
</header>

<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<div class="reader-shell">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-title">الفهرس</div>
    <a class="toc-item" data-section="dedication">
      <div class="toc-num">✦</div>
      <div><div class="toc-text">الإهداء</div><div class="toc-item-meta">صفحة شعرية</div></div>
    </a>
    <a class="toc-item" data-section="preface">
      <div class="toc-num">٠</div>
      <div><div class="toc-text">المقدمة</div><div class="toc-item-meta">افتتاحية</div></div>
    </a>
    <div class="toc-section-label">الفصول السبعة</div>
    <div id="chapterToc"></div>
    <div class="toc-section-label">الملاحق</div>
    <div id="appendixToc"></div>
    <div class="toc-section-label">التنزيل</div>
    <a class="toc-item" href="Print_Ready_Entropy_of_Longing_FULL.pdf" download>
      <div class="toc-num">⤓</div>
      <div><div class="toc-text">نسخة الطباعة PDF</div><div class="toc-item-meta">47 صفحة</div></div>
    </a>
    <a class="toc-item" href="Digital_Reading_Entropy_of_Longing_FULL.pdf" download>
      <div class="toc-num">⤓</div>
      <div><div class="toc-text">نسخة رقمية PDF</div><div class="toc-item-meta">A5</div></div>
    </a>
    <a class="toc-item" href="/">
      <div class="toc-num">←</div>
      <div><div class="toc-text">العودة للرئيسية</div></div>
    </a>
  </aside>

  <main class="reading-area" id="readingArea"></main>
</div>

<script>
let bookData = null;
let currentSection = 'preface';
const STORAGE_KEY = 'entropy-reader-v2-state';
const CHAPTER_ORDINALS = ['الأول','الثاني','الثالث','الرابع','الخامس','السادس','السابع'];

function loadState() {
  try {
    const s = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    if (s.section !== undefined) currentSection = s.section;
    if (s.theme) applyTheme(s.theme);
    if (s.fontSize) applyFontSize(s.fontSize);
  } catch (e) {}
}
function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({
    section: currentSection,
    theme: document.documentElement.className.match(/theme-(\w+)/)?.[1] || 'parchment',
    fontSize: parseInt(getComputedStyle(document.documentElement).getPropertyValue('--reading-size')) || 19,
  }));
}

function applyTheme(theme) {
  document.documentElement.className = 'theme-' + theme;
  document.querySelectorAll('.theme-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.theme === theme);
  });
  saveState();
}
function applyFontSize(px) {
  document.documentElement.style.setProperty('--reading-size', px + 'px');
  const lh = px <= 17 ? 1.85 : px >= 21 ? 2.05 : 1.95;
  document.documentElement.style.setProperty('--reading-lh', lh);
  document.querySelectorAll('.size-btn').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.size) === px);
  });
  saveState();
}

function renderBlock(b, isFirst = false) {
  const cls = isFirst && b.type === 'p' ? ' class="first-para"' : '';
  if (b.type === 'p') return `<p${cls}>${b.text}</p>`;
  if (b.type === 'voice') return `<div class="voice">${b.text}</div>`;
  if (b.type === 'whisper') return `<div class="whisper">${b.text}</div>`;
  if (b.type === 'letter') return `<div class="letter">${b.text}</div>`;
  if (b.type === 'signature') return `<div class="signature">${b.text}</div>`;
  return `<p${cls}>${b.text}</p>`;
}

function renderChapterToc() {
  const container = document.getElementById('chapterToc');
  container.innerHTML = '';
  bookData.chapters.forEach((ch, i) => {
    const item = document.createElement('a');
    item.className = 'toc-item';
    item.dataset.section = 'ch' + i;
    const titleParts = ch.title.split(' - ');
    const shortTitle = titleParts[0].replace(/^الفصل\s+\S+:\s*/, '');
    item.innerHTML = `
      <div class="toc-num">${i+1}</div>
      <div>
        <div class="toc-text">${shortTitle}</div>
        <div class="toc-item-meta">${ch.blocks.length} فقرة</div>
      </div>
    `;
    item.addEventListener('click', (e) => {
      e.preventDefault();
      navigateTo('ch' + i);
    });
    container.appendChild(item);
  });
}

function renderAppendixToc() {
  const container = document.getElementById('appendixToc');
  container.innerHTML = '';
  bookData.appendices.forEach((ap, i) => {
    const item = document.createElement('a');
    item.className = 'toc-item';
    item.dataset.section = 'ap' + i;
    const shortTitle = ap.title.length > 30 ? ap.title.substring(0, 30) + '…' : ap.title;
    item.innerHTML = `
      <div class="toc-num">★</div>
      <div>
        <div class="toc-text">${shortTitle}</div>
        <div class="toc-item-meta">ملحق ${i+1}</div>
      </div>
    `;
    item.addEventListener('click', (e) => {
      e.preventDefault();
      navigateTo('ap' + i);
    });
    container.appendChild(item);
  });
}

function renderDedication() {
  const area = document.getElementById('readingArea');
  const linesHtml = bookData.dedication.lines.map(l => `<span style="display:block; margin-bottom: 0.5em;">${l}</span>`).join('');
  area.innerHTML = `
    <article style="text-align:center; padding: 60px 0;">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--brass)" stroke-width="1.2" style="opacity:0.6; margin-bottom: 32px;">
        <circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="3" fill="var(--brass)" stroke="none"/>
        <line x1="12" y1="0" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="24"/>
        <line x1="0" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="24" y2="12"/>
      </svg>
      <div style="font-family: var(--f-quote); font-style: italic; font-size: 20px; line-height: 2.0; color: var(--ink); max-width: 540px; margin: 0 auto;">
        ${linesHtml}
      </div>
      <div style="font-family: var(--f-display); font-size: 18px; color: var(--brass); margin-top: 48px; letter-spacing: 0.06em;">
        معكم صِرتُ نظامًا لا يفنى<br>حبّه ثابتٌ وطاقته لا تنضب
      </div>
      <div style="font-family: var(--f-head); font-size: 13px; color: var(--ink-mute); margin-top: 24px; letter-spacing: 0.2em;">شذى ياسر</div>
    </article>
    ${renderChapterNav('dedication')}
  `;
  document.getElementById('chapterLabel').textContent = 'الإهداء';
  updateActiveToc('dedication');
  window.scrollTo({ top: 0, behavior: 'instant' });
  bindNav();
}

function renderPreface() {
  const area = document.getElementById('readingArea');
  const blocksHtml = bookData.preface.blocks.map((b, i) => renderBlock(b, i === 0)).join('');
  area.innerHTML = `
    <article class="preface-view">
      <div class="preface-epigraph">${bookData.preface.epigraph || ''}</div>
      <h1 class="preface-title">مقدمة</h1>
      <div class="preface-body">${blocksHtml}</div>
      <div class="preface-sign">
        <span class="sig-name">شذى</span>
        الكون: الأرض.<br>الساعة ٣:١٧ فجرًا.
      </div>
    </article>
    ${renderChapterNav('preface')}
  `;
  document.getElementById('chapterLabel').textContent = 'المقدمة';
  updateActiveToc('preface');
  window.scrollTo({ top: 0, behavior: 'instant' });
  bindNav();
}

function renderChapter(idx) {
  const ch = bookData.chapters[idx];
  const area = document.getElementById('readingArea');
  const blocksHtml = ch.blocks.map((b, i) => renderBlock(b, i === 0)).join('');

  let mainTitle = ch.title, subTitle = '';
  if (ch.title.includes(' - ')) {
    const dashIdx = ch.title.indexOf(' - ');
    mainTitle = ch.title.substring(0, dashIdx);
    subTitle = ch.title.substring(dashIdx + 3);
  }
  // Remove "الفصل X:" prefix from mainTitle
  mainTitle = mainTitle.replace(/^الفصل\s+\S+:\s*/, '');

  area.innerHTML = `
    <article>
      <header class="chapter-opener">
        <svg class="chapter-opener-orbit" viewBox="0 0 200 200" fill="none" stroke="currentColor" stroke-width="0.4">
          <circle cx="100" cy="100" r="95"/>
          <circle cx="100" cy="100" r="72"/>
          <circle cx="100" cy="100" r="48"/>
          <ellipse cx="100" cy="100" rx="95" ry="40" transform="rotate(15 100 100)"/>
          <ellipse cx="100" cy="100" rx="95" ry="40" transform="rotate(-25 100 100)"/>
          <circle cx="100" cy="5" r="2" fill="currentColor" stroke="none"/>
        </svg>
        <div class="chapter-opener-num">${idx+1}</div>
        <div class="chapter-opener-label">الفصل ${CHAPTER_ORDINALS[idx] || (idx+1)}</div>
        <h1 class="chapter-opener-title">${mainTitle}${subTitle ? `<span class="chapter-opener-sub">${subTitle}</span>` : ''}</h1>
        <div class="chapter-opener-rule"></div>
        ${ch.epigraph ? `<div class="chapter-opener-epigraph">${ch.epigraph}</div>` : ''}
      </header>
      <div class="reading-content">${blocksHtml}</div>
    </article>
    ${renderChapterNav('ch' + idx)}
  `;
  document.getElementById('chapterLabel').textContent = mainTitle;
  updateActiveToc('ch' + idx);
  window.scrollTo({ top: 0, behavior: 'instant' });
  bindNav();
}

function renderAppendix(idx) {
  const ap = bookData.appendices[idx];
  const area = document.getElementById('readingArea');
  let html = `<article>
    <header class="chapter-opener">
      <div class="chapter-opener-label">ملحق</div>
      <h1 class="chapter-opener-title" style="font-size: 32px;">${ap.title}</h1>
      <div class="chapter-opener-rule"></div>
    </header>
    <div class="reading-content">`;

  if (ap.intro) {
    ap.intro.forEach((b, i) => {
      html += renderBlock(b, i === 0);
    });
  }
  for (const ss of ap.sub_sections) {
    if (ss.title) {
      html += `<h2 class="sub-section-title">${ss.title}</h2>`;
    }
    ss.blocks.forEach((b, i) => {
      html += renderBlock(b, i === 0 && !ss.title);
    });
  }
  html += `</div></article>${renderChapterNav('ap' + idx)}`;
  area.innerHTML = html;
  document.getElementById('chapterLabel').textContent = ap.title.length > 30 ? ap.title.substring(0, 30) + '…' : ap.title;
  updateActiveToc('ap' + idx);
  window.scrollTo({ top: 0, behavior: 'instant' });
  bindNav();
}

function renderEndOfBook() {
  const area = document.getElementById('readingArea');
  area.innerHTML = `
    <div class="end-of-book">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
        <circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="3" fill="currentColor" stroke="none"/>
        <line x1="12" y1="0" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="24"/>
        <line x1="0" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="24" y2="12"/>
      </svg>
      <div class="end-of-book-text">تمّت الرواية.<br>لا شيء يُفنى، لكن كل شيء يتغيّر.</div>
      <a href="#" class="end-of-book-back" id="backToStart">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12l9-9 9 9M5 10v10h14V10"/></svg>
        العودة للبداية
      </a>
    </div>
  `;
  document.getElementById('chapterLabel').textContent = 'النهاية';
  document.getElementById('backToStart').addEventListener('click', (e) => {
    e.preventDefault();
    navigateTo('preface');
  });
}

function renderChapterNav(current) {
  // Build the ordered list of sections
  const sections = ['dedication', 'preface'];
  for (let i = 0; i < bookData.chapters.length; i++) sections.push('ch' + i);
  for (let i = 0; i < bookData.appendices.length; i++) sections.push('ap' + i);
  sections.push('end');

  const idx = sections.indexOf(current);
  const prev = idx > 0 ? sections[idx - 1] : null;
  const next = idx < sections.length - 1 ? sections[idx + 1] : null;

  function getLabel(s) {
    if (s === 'dedication') return 'الإهداء';
    if (s === 'preface') return 'المقدمة';
    if (s === 'end') return 'تمّت الرواية';
    if (s && s.startsWith('ch')) {
      const i = parseInt(s.substring(2));
      const t = bookData.chapters[i].title.split(' - ')[0].replace(/^الفصل\s+\S+:\s*/, '');
      return t;
    }
    if (s && s.startsWith('ap')) {
      const i = parseInt(s.substring(2));
      return bookData.appendices[i].title.substring(0, 25);
    }
    return '';
  }

  return `
    <nav class="chapter-nav">
      <button class="nav-btn" data-nav="${prev || ''}" ${prev === null ? 'disabled' : ''}>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
        <div style="text-align: start;">
          <div class="nav-btn-label">السابق</div>
          <div class="nav-btn-title">${prev ? getLabel(prev) : '—'}</div>
        </div>
      </button>
      <button class="nav-btn" data-nav="${next || ''}" ${next === null ? 'disabled' : ''}>
        <div style="text-align: end;">
          <div class="nav-btn-label">التالي</div>
          <div class="nav-btn-title">${next ? getLabel(next) : '—'}</div>
        </div>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
    </nav>
  `;
}

function bindNav() {
  document.querySelectorAll('[data-nav]').forEach(btn => {
    btn.addEventListener('click', () => {
      const target = btn.dataset.nav;
      if (!target) return;
      navigateTo(target);
    });
  });
}

function navigateTo(section) {
  currentSection = section;
  if (section === 'dedication') renderDedication();
  else if (section === 'preface') renderPreface();
  else if (section === 'end') renderEndOfBook();
  else if (section.startsWith('ch')) renderChapter(parseInt(section.substring(2)));
  else if (section.startsWith('ap')) renderAppendix(parseInt(section.substring(2)));
  saveState();
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('show');
}

function updateActiveToc(section) {
  document.querySelectorAll('.toc-item').forEach(item => {
    item.classList.toggle('active', item.dataset.section === section);
  });
}

function updateProgress() {
  const scrollTop = window.scrollY;
  const docHeight = document.documentElement.scrollHeight - window.innerHeight;
  const pct = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
  document.getElementById('progressFill').style.width = pct + '%';
}

async function init() {
  try {
    const res = await fetch('book-data.json');
    bookData = await res.json();
  } catch (e) {
    document.getElementById('readingArea').innerHTML = '<p style="text-align:center; padding:60px 0; color:var(--ink-mute)">تعذّر تحميل بيانات الرواية.</p>';
    return;
  }
  loadState();
  renderChapterToc();
  renderAppendixToc();
  if (!document.documentElement.className.match(/theme-/)) applyTheme('parchment');

  // Check URL hash for deep linking
  const hash = window.location.hash.substring(1);
  if (hash && (hash === 'dedication' || hash === 'preface' || hash === 'end' || hash.startsWith('ch') || hash.startsWith('ap'))) {
    navigateTo(hash);
  } else if (currentSection === 'dedication') renderDedication();
  else if (currentSection === 'preface') renderPreface();
  else if (currentSection === 'end') renderEndOfBook();
  else if (currentSection.startsWith('ch')) renderChapter(parseInt(currentSection.substring(2)));
  else if (currentSection.startsWith('ap')) renderAppendix(parseInt(currentSection.substring(2)));
  else renderPreface();

  document.querySelectorAll('.theme-btn').forEach(btn => {
    btn.addEventListener('click', () => applyTheme(btn.dataset.theme));
  });
  document.querySelectorAll('.size-btn').forEach(btn => {
    btn.addEventListener('click', () => applyFontSize(parseInt(btn.dataset.size)));
  });
  document.getElementById('sidebarToggle').addEventListener('click', () => {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('sidebarOverlay').classList.toggle('show');
  });
  document.getElementById('sidebarOverlay').addEventListener('click', () => {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebarOverlay').classList.remove('show');
  });
  window.addEventListener('scroll', updateProgress, { passive: true });
  updateProgress();

  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    if (e.key === 'ArrowLeft') {
      const nextBtn = document.querySelectorAll('[data-nav]')[1];
      if (nextBtn && !nextBtn.disabled) nextBtn.click();
    } else if (e.key === 'ArrowRight') {
      const prevBtn = document.querySelectorAll('[data-nav]')[0];
      if (prevBtn && !prevBtn.disabled) prevBtn.click();
    }
  });
}

init();
</script>

</body>
</html>
